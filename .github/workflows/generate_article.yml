name: Generate Daily Article

on:
  schedule:
    - cron: '30 3 * * 1-6'   # 9:00 AM IST (UTC+5:30), Mon–Sat

  workflow_dispatch:
    inputs:
      date:
        description: 'Date to generate (YYYY-MM-DD). Leave empty for today.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run only (no file writes)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Required so the bot can git push back to the repo
permissions:
  contents: write

jobs:
  generate:
    name: Generate Article
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild schedule.json
        run: python backend/scripts/build_schedule.py

      - name: Generate article
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          DATE_ARG=""
          DRY_RUN_ARG=""

          if [ -n "${{ github.event.inputs.date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.date }}"
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi

          python backend/scripts/generate_article.py $DATE_ARG $DRY_RUN_ARG

      - name: Commit and push generated article
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --global user.name  "BlogBoard Bot"
          git config --global user.email "bot@blogboard.ai"

          git add frontend/blogs/
          git add backend/schedule.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Auto-generate article for $(date -u +'%Y-%m-%d') [skip ci]"
            git push
          fi
